    <path d="M74 24 L79 56"/>
    <path d="M71 22 L76 56"/>
    <path d="M68 22 L73 56"/>
    <path d="M70 28 h6"/>
    <path d="M70 32 h7"/>
    <path d="M70 36 h8"/>
    <path d="M71 40 h8"/>
    <path d="M71 44 h9"/>
    <path d="M71 48 h9"/>
